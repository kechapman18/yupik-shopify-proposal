const ITERATIONS = 250000;

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function decrypt(password) {
  const packed = b64ToBytes(CIPHERTEXT);
  const salt = packed.slice(0, 16);
  const iv = packed.slice(16, 28);
  const ciphertext = packed.slice(28);

  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    new TextEncoder().encode(password),
    'PBKDF2',
    false,
    ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  const plaintext = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv },
    key,
    ciphertext
  );
  return new TextDecoder().decode(plaintext);
}

document.getElementById('gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  errEl.hidden = true;
  try {
    const html = await decrypt(pwd);
    document.getElementById('content').innerHTML = html;
    document.getElementById('gate').remove();
    document.getElementById('content').hidden = false;
    sessionStorage.setItem('yupik-pwd', pwd);
  } catch (err) {
    errEl.hidden = false;
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});

(async () => {
  const saved = sessionStorage.getItem('yupik-pwd');
  if (saved) {
    try {
      const html = await decrypt(saved);
      document.getElementById('content').innerHTML = html;
      document.getElementById('gate').remove();
      document.getElementById('content').hidden = false;
    } catch (e) {
      sessionStorage.removeItem('yupik-pwd');
    }
  }
})();
</script>
